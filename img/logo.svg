<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    
    <!-- Google Colors Gradient for the Border -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4"/> <!-- Blue -->
      <stop offset="33%" style="stop-color:#EA4335"/> <!-- Red -->
      <stop offset="66%" style="stop-color:#FBBC05"/> <!-- Yellow -->
      <stop offset="100%" style="stop-color:#34A853"/> <!-- Green -->
    </linearGradient>

    <!-- Drop Shadow for Letters -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Gradient for H -->
    <linearGradient id="grad-h" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>

    <!-- Gradient for F -->
    <linearGradient id="grad-f" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square with gradient and animated stroke -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bg-grad)" stroke="url(#ring)" stroke-width="16" />

  <!-- Inner subtle glow ring -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="4" />

  <g filter="url(#shadow)">
    <!-- H letter - Intersecting modern shapes -->
    <path d="M 120 140 C 130 140 140 150 140 160 L 140 352 C 140 362 130 372 120 372 C 110 372 100 362 100 352 L 100 160 C 100 150 110 140 120 140 Z" fill="url(#grad-h)"/>
    <path d="M 220 140 C 230 140 240 150 240 160 L 240 352 C 240 362 230 372 220 372 C 210 372 200 362 200 352 L 200 160 C 200 150 210 140 220 140 Z" fill="url(#grad-h)"/>
    <!-- H crossbar, overlaps and bends slightly -->
    <path d="M 120 236 L 220 236 C 230 236 240 246 240 256 C 240 266 230 276 220 276 L 120 276 C 110 276 100 266 100 256 C 100 246 110 236 120 236 Z" fill="url(#grad-h)"/>

    <!-- F letter - Floating layered look -->
    <path d="M 320 140 C 330 140 340 150 340 160 L 340 352 C 340 362 330 372 320 372 C 310 372 300 362 300 352 L 300 160 C 300 150 310 140 320 140 Z" fill="url(#grad-f)"/>
    <path d="M 310 140 L 400 140 C 410 140 420 150 420 160 C 420 170 410 180 400 180 L 310 180 C 300 180 290 170 290 160 C 290 150 300 140 310 140 Z" fill="url(#grad-f)"/>
    <path d="M 310 236 L 370 236 C 380 236 390 246 390 256 C 390 266 380 276 370 276 L 310 276 C 300 276 290 266 290 256 C 290 246 300 236 310 236 Z" fill="url(#grad-f)"/>
  </g>
</svg>
